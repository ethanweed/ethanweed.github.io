<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Tracker Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1ec;
            color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 48px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .book-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        p.description {
            font-size: 1rem;
            color: #555;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            background-color: #4a6fa5;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-bottom: 28px;
        }

        .cta-button:hover {
            background-color: #3a5a8f;
            transform: translateY(-2px);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .warning {
            background-color: #fff8e1;
            border-left: 4px solid #f9a825;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #6d4c00;
            text-align: left;
            line-height: 1.5;
        }

        .warning strong {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="book-icon">📚</div>
        <h1>Welcome to the Reading Tracking Demo</h1>
        <p class="description">
            Visualize of your reading..
        </p>
        <a class="cta-button" href="https://ethanweed.github.io/other/reading_tracker_demo.html" target="_blank" rel="noopener noreferrer">
            Launch Demo →
        </a>
        <div class="warning">
            <strong>⚠️ Heads up!</strong>
            The demo may be slow to load on a mobile phone, so give it a bit of time.
